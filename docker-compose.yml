services:
  aqua:
    build: .
    ports:
      - "8080:8080"
    environment:
      AQUA_DATA_DIR: /data
      # Use MQTT broker from this stack (set to host.docker.internal if broker runs on host)
      AQUA_MQTT_BROKER_HOST: mosquitto
      AQUA_MQTT_BROKER_PORT: "1883"
    volumes:
      - aqua_data:/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
    # Default config allows anonymous; override with a local mosquitto.conf if needed
    restart: unless-stopped

volumes:
  aqua_data:
  mosquitto_data:
