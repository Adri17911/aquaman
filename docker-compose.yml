services:
  aqua:
    build: .
    ports:
      - "8080:8080"
    environment:
      AQUA_DATA_DIR: /data
      # Use MQTT broker from this stack (set to host.docker.internal if broker runs on host)
      AQUA_MQTT_BROKER_HOST: mosquitto
      AQUA_MQTT_BROKER_PORT: "1883"
      # Optional: set a secret in production so JWT tokens survive restarts (e.g. in Portainer env)
      # AQUA_JWT_SECRET: "your-secret-here"
    volumes:
      - aqua_data:/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - mosquitto_data:/mosquitto/data
      # For MQTTs, mount config and certs (see mosquitto/mosquitto.conf.example and DOCKER.md):
      # - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      # - ./mosquitto/certs:/mosquitto/certs:ro
    # Default: anonymous on 1883. To enable TLS on 8883, mount mosquitto.conf and certs.
    restart: unless-stopped

volumes:
  aqua_data:
  mosquitto_data:
